<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FDA Pipeline Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      padding: 2rem;
      max-width: 960px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }

    .status-bar .next-run {
      flex: 1;
      font-size: 0.875rem;
      color: #555;
    }

    .status-bar .next-run strong {
      color: #111;
    }

    .schedule-control {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: #555;
    }

    .schedule-control input[type="time"] {
      font-family: "SF Mono", "Cascadia Code", monospace;
      font-size: 0.8rem;
      padding: 0.35rem 0.5rem;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #fff;
      color: #333;
    }

    button {
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      cursor: pointer;
      background: #fff;
      color: #333;
      transition: background 0.15s;
    }

    button:hover { background: #f0f0f0; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    button.primary {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    button.primary:hover { background: #333; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      font-size: 0.825rem;
    }

    th {
      text-align: left;
      padding: 0.65rem 1rem;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #777;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
    }

    td {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }

    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .badge.success { background: #e6f4ea; color: #1e7e34; }
    .badge.failed  { background: #fde8e8; color: #c0392b; }
    .badge.running { background: #e8f0fe; color: #1a73e8; }

    .empty {
      text-align: center;
      padding: 2rem;
      color: #999;
      font-size: 0.875rem;
    }

    .mono { font-family: "SF Mono", "Cascadia Code", monospace; font-size: 0.8rem; }
  </style>
</head>
<body>

  <h1>FDA Pipeline Monitor</h1>

  <div class="status-bar">
    <div class="next-run">
      Next scheduled run: <strong id="next-run">--</strong>
    </div>
    <div class="schedule-control">
      <label for="schedule-time">Daily at</label>
      <input type="time" id="schedule-time" value="02:00" onchange="updateSchedule(this.value)">
    </div>
    <button class="primary" id="btn-run" onclick="triggerRun(false)">Run Now</button>
    <button id="btn-full" onclick="triggerRun(true)">Full Refresh</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>Type</th>
        <th>Duration</th>
        <th>Records</th>
        <th>Rows Loaded</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="runs-body">
      <tr><td colspan="6" class="empty">Loading...</td></tr>
    </tbody>
  </table>

<script>
  const API = '';

  function formatTime(iso) {
    if (!iso) return '--';
    const d = new Date(iso);
    return d.toLocaleString(undefined, {
      month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
  }

  function formatDuration(sec) {
    if (sec == null) return '--';
    if (sec < 60) return sec.toFixed(1) + 's';
    const m = Math.floor(sec / 60);
    const s = (sec % 60).toFixed(0);
    return m + 'm ' + s + 's';
  }

  function formatNum(n) {
    if (n == null) return '--';
    return n.toLocaleString();
  }

  function badge(status) {
    const label = status === 'running' ? 'Running...' : status.charAt(0).toUpperCase() + status.slice(1);
    return '<span class="badge ' + status + '">' + label + '</span>';
  }

  function renderRuns(runs) {
    const tbody = document.getElementById('runs-body');
    if (!runs || runs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">No pipeline runs yet</td></tr>';
      return;
    }
    tbody.innerHTML = runs.map(function(r) {
      const type = r.full_refresh ? 'Full' : 'Incremental';
      return '<tr>' +
        '<td class="mono">' + formatTime(r.started_at) + '</td>' +
        '<td>' + type + '</td>' +
        '<td class="mono">' + formatDuration(r.duration_seconds) + '</td>' +
        '<td class="mono">' + formatNum(r.records_extracted) + '</td>' +
        '<td class="mono">' + formatNum(r.rows_loaded) + '</td>' +
        '<td>' + badge(r.status) + '</td>' +
        '</tr>';
    }).join('');
  }

  function refresh() {
    fetch(API + '/api/status')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        document.getElementById('next-run').textContent = formatTime(data.next_run);
        if (data.schedule_time) {
          document.getElementById('schedule-time').value = data.schedule_time;
        }

        var running = data.pipeline_running;
        document.getElementById('btn-run').disabled = running;
        document.getElementById('btn-full').disabled = running;

        renderRuns(data.runs);
      })
      .catch(function(err) { console.error('Refresh failed:', err); });
  }

  function triggerRun(fullRefresh) {
    var url = API + '/api/run' + (fullRefresh ? '?full_refresh=true' : '');
    document.getElementById('btn-run').disabled = true;
    document.getElementById('btn-full').disabled = true;

    fetch(url, { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function() { setTimeout(refresh, 1000); })
      .catch(function(err) { console.error('Trigger failed:', err); });
  }

  function updateSchedule(timeValue) {
    fetch(API + '/api/schedule', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ time: timeValue })
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.next_run) {
          document.getElementById('next-run').textContent = formatTime(data.next_run);
        }
      })
      .catch(function(err) { console.error('Schedule update failed:', err); });
  }

  // Initial load + poll every 5 seconds
  refresh();
  setInterval(refresh, 5000);
</script>

</body>
</html>
